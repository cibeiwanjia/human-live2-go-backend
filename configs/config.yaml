common:
  name: "Awesome-Digital-Human"
  version: "v3.0.0"
  log_level: "debug"

server:
  ip: "0.0.0.0"
  port: 8881
  workspace_path: "./outputs"

database:
  type: "postgres"
  host: "${DB_HOST:localhost}"
  port: 5432
  name: "${DB_NAME:digitalhuman}"
  user: "${DB_USER:postgres}"
  password: "${DB_PASSWORD:}"

redis:
  host: "${REDIS_HOST:localhost}"
  port: 6379
  password: "${REDIS_PASSWORD:}"
  db: 0

agents:
  support_list:
    - name: "RepeaterAgent"
      type: "AGENT"
      desc: "Repeat user input (for testing)"
    - name: "OpenAIAgent"
      type: "AGENT"
      desc: "OpenAI compatible agent"
      config:
        # 填写你的 DeepSeek API Key
        api_key: ""
        # DeepSeek API 地址
        base_url: "https://api.deepseek.com/v1"
        # 模型名称
        model: "deepseek-chat"
  default: "OpenAIAgent"

engines:
  tts:
    support_list:
      - name: "EdgeTTS"
        type: "TTS"
        desc: "Microsoft Edge TTS (free, no setup required)"
      - name: "TencentTTS"
        type: "TTS"
        desc: "Tencent Cloud TTS"
        config:
          # 填写你的腾讯云凭证
          app_id: ""
          secret_id: ""
          secret_key: ""
      - name: "SimpleTTS"
        type: "TTS"
        desc: "Simple Local TTS (requires say/espeak)"
    default: "EdgeTTS"
  asr:
    support_list:
      - name: "FunASR"
        type: "ASR"
        desc: "FunASR Streaming ASR"
    default: "FunASR"