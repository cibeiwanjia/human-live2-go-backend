version: '3.8'

services:
  go-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: adh-go-backend
    ports:
      - "8881:8881"
    environment:
      - CONFIG_PATH=/app/configs/config.yaml
      - LOG_LEVEL=info
      - DB_HOST=postgres
      - DB_NAME=digitalhuman
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - REDIS_HOST=redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - adh-network
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: adh-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=digitalhuman
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - adh-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: adh-redis
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - adh-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: adh-nginx
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
    depends_on:
      - go-backend
    networks:
      - adh-network
    restart: unless-stopped

networks:
  adh-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data: